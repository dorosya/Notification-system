services:

  consumer:
    depends_on:
      rabbitmq:
        condition: service_healthy
    build:
      context: ./Notification_service
      dockerfile: Dockerfile
    env_file:
      - ./Notification_service/.env
    networks:
      - app_network
  producer:
    depends_on:
      rabbitmq:
        condition: service_healthy
    build:
      context: ./producer
      dockerfile: Dockerfile
    env_file:
      - ./producer/.env
    ports:
      - 8080:8080
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:4.2.3-alpine
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672" # Standard AMQP port
      - "15672:15672" # HTTP Management UI port
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  static-server:
    image: python:3.12-alpine
    working_dir: /app/static
    command: python -m http.server 8000
    volumes:
      - ./static:/app/static
    ports:
      - "8000:8000"
    networks:
      - app_network
      
networks:
  app_network:
    driver: bridge